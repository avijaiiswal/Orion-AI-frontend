<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion AI Hub | Premium Architecture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <!-- Schema Markup -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Orion AI Hub",
      "url": "https://orion-ai-hub.vercel.app",
      "description": "Premium AI toolkit for Indian creators, startups, and entrepreneurs. Pitch decks, viral hooks, cold emails, thumbnail audits — powered by Gemini and LLaMA.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "inLanguage": "en-IN",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR",
        "description": "5 free trials, then plans from Rs.350 per week"
      },
      "author": {
        "@type": "Organization",
        "name": "Orion AI Hub",
        "foundingDate": "2026-06",
        "sameAs": ["https://www.instagram.com/aaosamjhoai"]
      }
    }
    </script>
</head>
<body>

    <div id="toastContainer" class="toast-container"></div>

    <!-- Login Modal -->
    <div id="loginWall" class="modal-overlay">
        <div class="auth-card">
            <div class="logo-pulse"><i class="fa-solid fa-space-shuttle"></i></div>
            <h2>Orion <span>Hub</span></h2>
            <p>// secure_auth_node.init</p>
            <input type="email" id="userDirectEmail" placeholder="registration@email.com">
            <button id="authTriggerBtn" onclick="triggerDirectLogin()">Connect Secure Node</button>
        </div>
    </div>

    <!-- Paywall Modal -->
    <div id="paywallModal">
        <div class="paywall-card">
            <div class="paywall-icon"><i class="fa-solid fa-lock"></i></div>
            <h3>Upgrade Required</h3>
            <p>You've hit the free tier limit. Unlock unlimited access with a premium plan.</p>
            <button class="paywall-close" onclick="document.getElementById('paywallModal').classList.remove('visible')">Maybe later</button>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section">
                <h2>Orion<span>Hub</span></h2>
                <div class="logo-tagline">AI Toolkit v1.0</div>
            </div>

            <div class="nav-label">Modules</div>
            <nav class="nav-menu">
                <button class="nav-item active" onclick="switchTab('startup')">
                    <i class="fa-solid fa-rocket"></i> Startup Suite
                </button>
                <button class="nav-item" onclick="switchTab('creator')">
                    <i class="fa-solid fa-video"></i> Creator Studio
                </button>
                <button class="nav-item" onclick="switchTab('marketing')">
                    <i class="fa-solid fa-bullseye"></i> Marketing
                </button>
                <button class="nav-item" onclick="switchTab('ecom')">
                    <i class="fa-solid fa-bag-shopping"></i> E-Commerce
                </button>
            </nav>

            <div class="sidebar-footer">
                <p class="version-tag">Production Engine: v1.0</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div>
                    <h1 id="tabTitle">Startup Suite</h1>
                </div>
                <div id="userBadge" class="user-tier-badge hidden">
                    <span id="badgeText">Account Mapping</span>
                </div>
            </header>

            <section class="workspace">
                <div class="tool-selector-wrap">
                    <select id="toolSelector" onchange="handleToolChange()"></select>
                </div>

                <textarea id="textInput" rows="6" placeholder="Enter your context, goals, or specifications here…"></textarea>

                <div id="imageSection">
                    <label class="image-upload-zone" for="imageInput">
                        <i class="fa-solid fa-image"></i>
                        <span id="imageLabel">Attach screenshot or image for analysis</span>
                        <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect()">
                    </label>
                </div>

                <button id="generateBtn" onclick="generateSolution()">
                    <i class="fa-solid fa-bolt"></i> Process Query
                </button>

                <div class="output-container">
                    <div class="output-header">
                        <div class="output-label">
                            <div class="output-dot"></div>
                            Output
                        </div>
                        <button id="copyBtn" onclick="copyToClipboard()">
                            <i class="fa-regular fa-copy"></i> Copy
                        </button>
                    </div>
                    <div id="outputBox">Aapka solution yahan appear hoga…</div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
    </html>
