<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion AI Hub | Premium Architecture</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="toastContainer" class="toast-container"></div>

    <div id="loginWall" class="modal-overlay">
        <div class="auth-card">
            <div class="logo-pulse"><i class="fa-solid fa-space-shuttle"></i></div>
            <h2>Orion <span style="color:var(--accent);">Hub</span></h2>
            <p>Secure Authentication Portal</p>
            <input type="email" id="userDirectEmail" placeholder="Enter registration email">
            <button id="authTriggerBtn" onclick="triggerDirectLogin()">Connect Secure Node</button>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section">
                <h2>Orion<span>Hub</span></h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" onclick="switchTab('startup')"><i class="fa-solid fa-rocket"></i> Startup Suite</button>
                <button class="nav-item" onclick="switchTab('creator')"><i class="fa-solid fa-video"></i> Creator Studio</button>
            </nav>
            <div class="sidebar-footer">
                <p class="version-tag">Production Engine: v1.0</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h1 id="tabTitle">Startup Suite</h1>
                <div id="userBadge" class="user-tier-badge hidden"><span id="badgeText">Account Mapping</span></div>
            </header>

            <section class="workspace">
                <div class="input-group">
                    <select id="toolSelector" onchange="handleToolChange()"></select>
                </div>
                <textarea id="textInput" rows="6" placeholder="Enter core context specifications..."></textarea>
                <button id="generateBtn" onclick="generateSolution()">Process Payload Query</button>

                <div class="output-container">
                    <div id="outputBox" class="output-box">Aapka solution matrix yahan appear hoga...</div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
